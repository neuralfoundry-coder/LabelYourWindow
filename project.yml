    ARCHS: arm64
    VALID_ARCHS: arm64
    EXCLUDED_ARCHS[sdk=*]: x86_64
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

targets:
  LabelYourWindow:
    type: application
    platform: macOS
    sources:
      - path: LabelYourWindow
